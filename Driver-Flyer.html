<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totali Recruitment Flyer - Pro Version</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --cyan: #00f2ff;
            --dark: #050505;
        }
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
        }
        .flyer-page {
            width: 8.5in;
            height: 11in;
            background: var(--dark);
            color: white;
            padding: 50px;
            box-sizing: border-box;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
        }
        .header {
            border-left: 5px solid var(--cyan);
            padding-left: 25px;
            margin-bottom: 50px;
            text-align: left;
        }
        .header h1 { 
            font-size: 5rem; 
            margin: 0; 
            font-weight: 900; 
            letter-spacing: -3px;
            line-height: 0.9;
        }
        .header p { 
            font-size: 1.8rem; 
            color: var(--cyan); 
            margin: 10px 0 0 0; 
            font-weight: 700; 
            text-transform: uppercase;
        }
        .hero-statement {
            font-size: 1.4rem;
            line-height: 1.4;
            margin-bottom: 40px;
            color: rgba(255,255,255,0.8);
            text-align: left;
        }
        .benefit-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 50px;
        }
        .benefit-item {
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .benefit-item h3 { 
            font-size: 1.2rem; 
            margin: 0 0 10px 0; 
            color: var(--cyan);
            text-transform: uppercase;
            font-weight: 800;
        }
        .benefit-item p { 
            margin: 0; 
            font-size: 1rem;
            color: rgba(255,255,255,0.7); 
            line-height: 1.5; 
        }
        .qr-area {
            margin-top: auto;
            display: flex;
            align-items: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            color: black;
            text-align: left;
        }
        .qr-box {
            width: 160px;
            height: 160px;
            margin-right: 30px;
        }
        .qr-box img { width: 100%; height: auto; }
        .qr-text h2 { margin: 0; font-size: 1.8rem; font-weight: 900; }
        .qr-text p { margin: 5px 0 0 0; color: #666; font-size: 1.1rem; }

        @media print {
            body { background: white; }
            .flyer-page { box-shadow: none; width: 100%; height: 100vh; }
            .btn-print { display: none; }
        }
        .btn-print {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 30px;
            background: var(--cyan);
            color: black;
            border: none;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>
